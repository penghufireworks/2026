    <!-- GitHub Pages SPA Path Recovery -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <script type="module" crossorigin src="/assets/index-Di0dUI0i.js"></script>

  <body>
    <div id="root"></div>

    <script>
      // 禁用 translateContent.js 和 jquery 的注入
      window.stopTranslate = true;
      // 攔截並移除可能導致錯誤的外部腳本
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach((node) => {
            if (node.tagName === 'SCRIPT' && (node.src.includes('translateContent.js') || node.src.includes('jquery'))) {
              node.remove();
              console.log('Blocked external script:', node.src);
            }
          });
        });
      });
      observer.observe(document.head, { childList: true, subtree: true });
      observer.observe(document.body, { childList: true, subtree: true });
    </script>
