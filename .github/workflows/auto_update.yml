name: Update Penghu Trends 
 
on:
  schedule:
    - cron: '*/10 * * * *'  # 每 10 分鐘執行一次
  workflow_dispatch:      # 允許手動在 GitHub 網頁上點擊執行
 
jobs: 
  build: 
    runs-on: ubuntu-latest 
    permissions: 
      contents: write    # 賦予腳本寫入檔案並推送到 Repo 的權限 
    steps: 
      - name: Checkout code 
        uses: actions/checkout@v4 
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Set up Python 
        uses: actions/setup-python@v5 
        with: 
          python-version: '3.9' 
 
      - name: Install dependencies
        run: pip install "pytrends==4.9.2" "urllib3<2" pandas requests openai 
 
      - name: Run trends script
        run: python update_penghu_trends.py

      - name: Run whisper script (generate AI blog post)
        run: python penghu_whisper.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update trends and blog [skip ci]"
          file_pattern: "googletrend.html ai_whispers/posts/*"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>