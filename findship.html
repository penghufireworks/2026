<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>澎湖港口即時監測 - penghu2026.shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .map-container {
            position: relative;
            padding-bottom: 65%;
            height: 0;
            overflow: hidden;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            background: #f1f5f9;
        }
        .map-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-extrabold text-blue-900 mb-2">澎湖港口船舶即時監測</h1>
            <p class="text-sm text-slate-500 font-medium">範圍：馬公港、西嶼海域 (僅顯示客運船舶)</p>
        </header>

        <div class="bg-white rounded-3xl p-2 border border-slate-200 shadow-sm overflow-hidden mb-6">
            <div class="map-container">
                <iframe 
                    id="marinetraffic" 
                    src="https://www.marinetraffic.com/en/ais/embed/zoom:12/centery:23.56/centerx:119.58/maptype:4/shownames:false/mmsi:416000287,416000109,416000072,416000271,416000263,416000143,416000108,416000201,416060100,416000202/vtypes:6,7/show_menu:false/remember:false" 
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            </div>
            
            <div class="px-5 py-4 bg-amber-50 border-t border-amber-100">
                <div class="flex items-start gap-3">
                    <span class="text-xl">⚠️</span>
                    <div class="text-xs text-amber-900 leading-relaxed">
                        <p class="font-bold mb-1 text-sm text-amber-800">數據準確度提醒：</p>
                        <p>受限於海象與基站收訊，船隻在<strong>海峽中段</strong>位置會有數小時延遲。請點擊船隻查看：</p>
                        <ul class="list-disc ml-4 mt-2 space-y-1">
                            <li><span class="font-bold text-green-700">minutes ago</span>：船隻靠近港口，位置<strong>極度準確</strong>。</li>
                            <li><span class="font-bold text-red-600">hours ago</span>：船隻目前在收訊盲區，位置僅供參考。</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="text-sm font-bold text-blue-700 mb-3 border-l-4 border-blue-600 pl-2">圖示顏色</h3>
                <div class="space-y-3 text-xs">
                    <p>🔵 <strong>藍色：</strong> 大型客輪 (如：澎湖輪)</p>
                    <p>🟡 <strong>黃色：</strong> 高速快艇 (如：太吉、滿天星、凱旋、百麗)</p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="text-sm font-bold text-slate-700 mb-3 border-l-4 border-slate-300 pl-2">常用船名</h3>
                <div class="grid grid-cols-2 gap-2 text-[10px] font-mono uppercase">
                    <div class="bg-slate-50 p-1 rounded border">PENGHU</div>
                    <div class="bg-slate-50 p-1 rounded border">TAI JI STAR</div>
                    <div class="bg-slate-50 p-1 rounded border">ALL SEAS JET</div>
                    <div class="bg-slate-50 p-1 rounded border">RIKULAU</div>
                </div>
            </div>
        </div>

        <footer class="text-center text-[10px] text-slate-400">
            <p>penghu2026.shop © 數位旅遊導覽服務</p>
        </footer>
    </div>
</body>
</html>
