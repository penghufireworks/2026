<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>澎湖船舶即時動態 - penghu2026.shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .map-container {
            position: relative;
            padding-bottom: 65%; /* 調整比例以適應海峽長度 */
            height: 0;
            overflow: hidden;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-5xl mx-auto px-4 py-10">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-extrabold text-blue-900 mb-3">澎湖航線船舶即時動態</h1>
            <p class="text-slate-500">即時追蹤：澎湖輪、太吉之星 3 號、滿天星 2 號</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <a href="https://www.marinetraffic.com/en/ais/details/ships/mmsi:416000287" target="_blank" class="flex items-center justify-between bg-white border-l-4 border-l-blue-600 p-6 rounded-xl shadow-sm hover:shadow-md hover:bg-blue-50 transition-all duration-300">
                <div>
                    <div class="font-bold text-blue-900 text-xl">🚢 澎湖輪</div>
                    <div class="text-sm text-blue-600 mt-1 tracking-wide">高雄 ⇋ 馬公</div>
                </div>
                <span class="text-blue-400 text-2xl font-light">➜</span>
            </a>
            
            <a href="https://www.marinetraffic.com/en/ais/details/ships/mmsi:416000109" target="_blank" class="flex items-center justify-between bg-white border-l-4 border-l-emerald-600 p-6 rounded-xl shadow-sm hover:shadow-md hover:bg-emerald-50 transition-all duration-300">
                <div>
                    <div class="font-bold text-emerald-900 text-xl">🚤 太吉之星 3 號</div>
                    <div class="text-sm text-emerald-600 mt-1 tracking-wide">布袋 ⇋ 馬公</div>
                </div>
                <span class="text-emerald-400 text-2xl font-light">➜</span>
            </a>

            <a href="https://www.marinetraffic.com/en/ais/details/ships/mmsi:416000072" target="_blank" class="flex items-center justify-between bg-white border-l-4 border-l-amber-600 p-6 rounded-xl shadow-sm hover:shadow-md hover:bg-amber-50 transition-all duration-300">
                <div>
                    <div class="font-bold text-amber-900 text-xl">🚤 滿天星 2 號</div>
                    <div class="text-sm text-amber-600 mt-1 tracking-wide">布袋 ⇋ 馬公</div>
                </div>
                <span class="text-amber-400 text-2xl font-light">➜</span>
            </a>
        </div>

        <div class="bg-white rounded-2xl p-3 border border-slate-200 shadow-sm">
            <div class="px-4 py-3 border-b border-slate-100 flex justify-between items-center mb-2">
                <h2 class="text-lg font-bold text-slate-800">📌 西嶼 － 布袋 航道即時監測</h2>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                    <span class="text-xs text-slate-400 font-medium tracking-tighter">LIVE 更新中</span>
                </div>
            </div>
            
            <div class="map-container">
                <iframe 
                    id="marinetraffic" 
                    src="https://www.marinetraffic.com/en/ais/embed/zoom:10/centery:23.58/centerx:120.0/maptype:4/shownames:true/mmsi:416000287,416000109,416000072/fleet:/fleet_id:/vtypes:/show_menu:true/remember:false" 
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <footer class="mt-12 border-t border-slate-200 pt-8 text-center text-slate-400">
            <div class="flex justify-center gap-3 mb-4">
                <span class="bg-slate-100 px-3 py-1 rounded-full text-[11px] font-medium border border-slate-200 uppercase">AIS Satellite Data</span>
                <span class="bg-slate-100 px-3 py-1 rounded-full text-[11px] font-medium border border-slate-200 uppercase tracking-widest">Penghu.shop</span>
            </div>
            <div class="max-w-2xl mx-auto space-y-2 text-xs leading-relaxed">
                <p>※ 本站數據由 AIS 船舶自動識別系統提供，可能受氣候或衛星信號影響產生 15-60 分鐘延遲。</p>
                <p>※ 地圖中心點已鎖定嘉義布袋至澎湖西嶼航段，適合監測往返船隻位置。</p>
                <p>※ 實際船班開航、抵達時間請以各船公司官方公告為準。</p>
            </div>
        </footer>
    </div>

</body>
</html>
