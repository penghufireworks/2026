<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>澎湖航線船舶即時動態 - penghu.shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .map-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }
        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">澎湖航線船舶即時動態</h1>
            <p class="text-slate-600">監測對象：澎湖輪、太吉之星3號、滿天星2號</p>
            <div class="mt-4 flex justify-center gap-4">
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
                    AIS 即時數據
                </span>
                <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                    自動更新中
                </span>
            </div>
        </header>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-slate-200">
            <div class="bg-slate-800 text-white px-4 py-2 flex justify-between items-center">
                <span class="text-sm font-medium">即時海圖追蹤</span>
                <span class="text-xs text-slate-400">數據來源：VesselFinder / MarineTraffic</span>
            </div>
            
<div class="map-container">
    <iframe 
        id="marinetraffic" 
        width="100%" 
        height="100%" 
        src="https://www.marinetraffic.com/en/ais/embed/zoom:9/centery:23.5/centerx:119.5/maptype:4/shownames:true/mmsi:416000287,416000109,416000072/fleet:/fleet_id:/vtypes:/show_menu:true/remember:false" 
        frameborder="0"
        allowfullscreen>
    </iframe>
</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8">
            <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                <h3 class="font-bold text-blue-700">澎湖輪 (PENGHU)</h3>
                <p class="text-xs text-slate-500 mt-1">MMSI: 416000287</p>
                <p class="text-sm mt-2 text-slate-600">航線：高雄 － 馬公</p>
            </div>
            <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                <h3 class="font-bold text-blue-700">太吉之星 3 號</h3>
                <p class="text-xs text-slate-500 mt-1">MMSI: 416000109</p>
                <p class="text-sm mt-2 text-slate-600">航線：布袋 － 馬公</p>
            </div>
            <div class="bg-white p-4 rounded-lg border border-slate-200 shadow-sm">
                <h3 class="font-bold text-blue-700">滿天星 2 號</h3>
                <p class="text-xs text-slate-500 mt-1">MMSI: 416000072</p>
                <p class="text-sm mt-2 text-slate-600">航線：布袋 － 馬公</p>
            </div>
        </div>

        <footer class="mt-8 text-center text-xs text-slate-400">
            <p>※ AIS 數據可能因接收站訊號或衛星延遲而有 15-60 分鐘落差。</p>
            <p>※ 實際船班開航資訊請以各船公司官網公告為準。</p>
        </footer>
    </div>

</body>
</html>
