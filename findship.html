<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <title>澎湖專屬航道監控 - penghu2026.shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .map-container {
            position: relative;
            padding-bottom: 65%;
            height: 0;
            overflow: hidden;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
        }
        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <div class="max-w-5xl mx-auto px-4 py-10">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-blue-900 mb-2">澎湖航線即時監測</h1>
            <p class="text-slate-500 font-medium">預設僅顯示：澎湖輪、太吉之星、滿天星、百麗、凱旋</p>
        </header>

        <div class="bg-white rounded-2xl p-2 border border-slate-200 shadow-sm overflow-hidden mb-8">
            <div class="map-container">
                <iframe 
                    id="marinetraffic" 
                    src="https://www.marinetraffic.com/en/ais/embed/zoom:10/centery:23.58/centerx:120.0/maptype:4/shownames:false/mmsi:416000287,416000109,416000072,416000271,416000263/fleet:/fleet_id:/vtypes:/show_menu:false/remember:false" 
                    frameborder="0"
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <h3 class="text-sm font-bold text-slate-800 mb-4 border-l-4 border-blue-600 pl-2">重點船舶 AIS 名稱</h3>
                    <div class="grid grid-cols-2 gap-2 text-[11px] font-mono">
                        <div class="bg-slate-50 p-2 rounded border">PENGHU (澎湖輪)</div>
                        <div class="bg-slate-50 p-2 rounded border">TAI JI STAR 3 (太吉)</div>
                        <div class="bg-slate-50 p-2 rounded border">ALL SEAS JET 2 (滿天星)</div>
                        <div class="bg-slate-50 p-2 rounded border">RIKULAU (雲豹)</div>
                        <div class="bg-slate-50 p-2 rounded border">TRIUMPH 8 (凱旋)</div>
                    </div>
                </div>
                <div>
                    <h3 class="text-sm font-bold text-slate-800 mb-4 border-l-4 border-yellow-500 pl-2">圖示說明</h3>
                    <ul class="text-xs space-y-2 text-slate-600">
                        <li class="flex items-center"><span class="w-3 h-3 bg-blue-500 mr-2 rounded-sm"></span> 藍色：大型客輪</li>
                        <li class="flex items-center"><span class="w-3 h-3 bg-yellow-500 mr-2 rounded-sm"></span> 黃色：高速快艇</li>
                        <li class="mt-2 text-blue-700 font-medium italic">※ 點擊地圖上的圖示即可看到詳細船名與時速。</li>
                    </ul>
                </div>
            </div>
        </section>

        <footer class="mt-10 text-center">
            <p class="text-[11px] text-slate-400">penghu2026.shop © 專為 2026 澎湖花火節遊客設計</p>
        </footer>
    </div>

</body>
</html>
